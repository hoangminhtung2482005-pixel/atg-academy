<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <script>
        const legacyPages = new Set([
            '/account.html',
            '/admin.html',
            '/create-guide.html',
            '/esports.html',
            '/giao-an.html',
            '/guide-detail.html',
            '/header.html',
            '/index.html',
            '/tier-list.html'
        ]);

        if (window.location.pathname === '/meta.html' || window.location.pathname === '/html/meta.html') {
            window.location.replace('/html/tier-list.html');
        } else
        if (legacyPages.has(window.location.pathname)) {
            window.location.replace('/html' + window.location.pathname);
        }
    </script>
</head>
<body>
    <p>Không tìm thấy trang.</p>
    <p><a href="/html/index.html">Về trang chủ</a></p>
</body>
</html>
