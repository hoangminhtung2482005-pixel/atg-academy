<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Dashboard - ATG Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=20260507-css-modules">
    <link rel="stylesheet" href="/css/account.css?v=20260507-css-modules">
    <link rel="stylesheet" href="/css/player-card.css?v=20260516-player-card-component">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="account-page">
        <div class="account-shell">
            <div class="account-heading">
                <div>
                    <h1>Account Dashboard</h1>
                    <p>Quản lý tên hiển thị, cấp độ và các lối tắt dành cho tài khoản của bạn.</p>
                </div>
                <button type="button" class="danger-btn" onclick="logoutFromAccountPage()">Đăng xuất</button>
            </div>

            <section class="account-card" id="account-dashboard-root">
                <div class="loading-state">Đang tải thông tin tài khoản...</div>
            </section>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="/js/components/player-card.js?v=20260516-player-card-component"></script>
    <script src="/js/auth.js?v=20260424-account-profile"></script>
    <script src="/js/header-loader.js?v=20260514-layout-partials"></script>
    <script>
        const accountProfileMessage = {
            text: '',
            type: 'success'
        };
        const ACCOUNT_COMMUNITY_TIER_LIST_LIMIT = 5;
        const ACCOUNT_PLAYER_CARD_DEFAULT_TITLE = '\u2726 T\u00e2n Binh Ban/Pick \u2726';
        const ACCOUNT_PLAYER_BADGE_OPTIONS = [
            { code: 'default', name: 'ATG Player', iconUrl: '' },
            { code: 'draft-scout', name: 'Draft Scout', iconUrl: '' },
            { code: 'shot-caller', name: 'Shot Caller', iconUrl: '' },
            { code: 'meta-reader', name: 'Meta Reader', iconUrl: '' }
        ];
        const accountPlayerCardMessage = {
            text: '',
            type: 'success'
        };
        const accountContentState = {
            ownerEmail: '',
            loading: false,
            loaded: false,
            error: '',
            activeList: '',
            summary: {
                guideCount: 0,
                tierListCount: 0,
                guides: [],
                tierLists: []
            }
        };
        const accountPlayerCardState = {
            ownerEmail: '',
            loading: false,
            loaded: false,
            error: '',
            saving: false,
            draft: null,
            profile: null
        };

        function accountEscapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function setAccountProfileMessage(text, type) {
            accountProfileMessage.text = text || '';
            accountProfileMessage.type = type === 'error' ? 'error' : 'success';
        }

        function setAccountPlayerCardMessage(text, type) {
            accountPlayerCardMessage.text = text || '';
            accountPlayerCardMessage.type = type === 'error' ? 'error' : 'success';
        }

        function resetAccountContentState(ownerEmail) {
            accountContentState.ownerEmail = ownerEmail || '';
            accountContentState.loading = false;
            accountContentState.loaded = false;
            accountContentState.error = '';
            accountContentState.activeList = '';
            accountContentState.summary = {
                guideCount: 0,
                tierListCount: 0,
                guides: [],
                tierLists: []
            };
        }

        function resetAccountPlayerCardState(ownerEmail) {
            accountPlayerCardState.ownerEmail = ownerEmail || '';
            accountPlayerCardState.loading = false;
            accountPlayerCardState.loaded = false;
            accountPlayerCardState.error = '';
            accountPlayerCardState.saving = false;
            accountPlayerCardState.draft = null;
            accountPlayerCardState.profile = null;
            setAccountPlayerCardMessage('', 'success');
        }

        function normalizeAccountContentSummary(payload) {
            return {
                guideCount: Number(payload?.guideCount || 0),
                tierListCount: Number(payload?.tierListCount || 0),
                guides: Array.isArray(payload?.guides) ? payload.guides : [],
                tierLists: Array.isArray(payload?.tierLists) ? payload.tierLists : []
            };
        }

        function ensureAccountContentStateFor(user) {
            const ownerEmail = String(user?.email || '').toLowerCase();
            if (accountContentState.ownerEmail !== ownerEmail) {
                resetAccountContentState(ownerEmail);
            }
        }

        function ensureAccountPlayerCardStateFor(user) {
            const ownerEmail = String(user?.email || '').toLowerCase();
            if (accountPlayerCardState.ownerEmail !== ownerEmail) {
                resetAccountPlayerCardState(ownerEmail);
            }
        }

        function findAccountPlayerBadgeOption(code) {
            const normalizedCode = String(code || '').trim().toLowerCase();
            return ACCOUNT_PLAYER_BADGE_OPTIONS.find(option => option.code === normalizedCode)
                || ACCOUNT_PLAYER_BADGE_OPTIONS[0];
        }

        function normalizeAccountPlayerCardFormData(user) {
            const draft = accountPlayerCardState.draft || {};
            const profilePlayerCard = accountPlayerCardState.profile?.playerCard || {};
            const badgeOption = findAccountPlayerBadgeOption(
                draft.badgeCode
                || profilePlayerCard.badgeCode
                || user?.playerBadgeCode
            );
            return {
                badgeCode: badgeOption.code,
                badgeName: draft.badgeName || profilePlayerCard.badgeName || user?.playerBadgeName || badgeOption.name,
                badgeIconUrl: draft.badgeIconUrl || profilePlayerCard.badgeIconUrl || user?.playerBadgeIconUrl || badgeOption.iconUrl || '',
                title: draft.title || profilePlayerCard.title || user?.playerTitle || ACCOUNT_PLAYER_CARD_DEFAULT_TITLE
            };
        }

        function formatAccountContentCount(value, type) {
            if (accountContentState.loading && !accountContentState.loaded) {
                return '...';
            }
            const normalizedCount = Number(value || 0);
            if (type === 'tierLists') {
                return `${normalizedCount.toLocaleString('vi-VN')}/${ACCOUNT_COMMUNITY_TIER_LIST_LIMIT}`;
            }
            return normalizedCount.toLocaleString('vi-VN');
        }

        function formatAccountContentDate(value) {
            if (!value) return 'Chưa rõ ngày';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return 'Chưa rõ ngày';
            return date.toLocaleDateString('vi-VN');
        }

        function renderAccountContentSummaryCard(type, label, count) {
            const isActive = accountContentState.activeList === type;
            const disabled = accountContentState.loading && !accountContentState.loaded ? ' disabled' : '';
            return `
                <article class="content-summary-card">
                    <div class="content-summary-top">
                        <span>
                            <span class="content-summary-label">${accountEscapeHtml(label)}</span>
                            <strong class="content-summary-count">${formatAccountContentCount(count, type)}</strong>
                        </span>
                        <button type="button" class="content-summary-action${isActive ? ' is-active' : ''}" onclick="showAccountContentList('${type}')"${disabled}>Xem tất cả</button>
                    </div>
                </article>
            `;
        }

        function renderAccountOwnedContentList() {
            if (accountContentState.loading && !accountContentState.loaded) {
                return '<div class="owned-content-state">Đang tải nội dung của bạn...</div>';
            }
            if (accountContentState.error) {
                return '<div class="owned-content-state">' + accountEscapeHtml(accountContentState.error) + '</div>';
            }
            if (!accountContentState.activeList) {
                return '';
            }

            const isGuideList = accountContentState.activeList === 'guides';
            const title = isGuideList ? 'Giáo án của bạn' : 'Tier List của bạn';
            const items = isGuideList ? accountContentState.summary.guides : accountContentState.summary.tierLists;
            const emptyText = isGuideList
                ? 'Bạn chưa đăng giáo án nào.'
                : 'Bạn chưa đăng Tier List cộng đồng nào.';

            if (!items.length) {
                return `
                    <div class="owned-content-head">
                        <strong>${title}</strong>
                        <button type="button" class="owned-content-close" onclick="hideAccountContentList()">Đóng</button>
                    </div>
                    <div class="owned-content-state">${emptyText}</div>
                `;
            }

            return `
                <div class="owned-content-head">
                    <strong>${title}</strong>
                    <button type="button" class="owned-content-close" onclick="hideAccountContentList()">Đóng</button>
                </div>
                <div class="owned-content-items">
                    ${items.map(item => {
                        const dateValue = item.publishedAt || item.createdAt || item.updatedAt;
                        const detailUrl = item.detailUrl || '#';
                        return `
                            <a class="owned-content-item" href="${accountEscapeHtml(detailUrl)}">
                                <strong>${accountEscapeHtml(item.title || 'Chưa có tiêu đề')}</strong>
                                <span>${accountEscapeHtml(formatAccountContentDate(dateValue))}</span>
                            </a>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderAccountPersonalContentPanel() {
            const summary = accountContentState.summary;
            const ownedList = renderAccountOwnedContentList();
            return `
                <aside class="side-panel personal-content-panel">
                    <div class="personal-content-head">
                        <h2 class="section-title">Nội dung của bạn</h2>
                        <p>Chỉ thống kê nội dung đã đăng thuộc tài khoản đang đăng nhập.</p>
                    </div>
                    <div class="content-summary-list">
                        ${renderAccountContentSummaryCard('guides', 'Giáo án đã đăng', summary.guideCount)}
                        ${renderAccountContentSummaryCard('tierLists', 'Tier List đã đăng', summary.tierListCount)}
                    </div>
                    ${ownedList ? `<div class="owned-content-list" id="account-owned-content-list">${ownedList}</div>` : ''}
                </aside>
            `;
        }

        function renderAccountPlayerCardEditor(user) {
            const playerCard = normalizeAccountPlayerCardFormData(user);
            const buttonLabel = accountPlayerCardState.saving ? 'Đang lưu...' : 'Lưu Player Card';
            const disabled = accountPlayerCardState.saving ? ' disabled' : '';
            const messageClass = accountPlayerCardMessage.text
                ? (accountPlayerCardMessage.type === 'error' ? ' is-error' : ' is-success')
                : '';

            return `
                <form class="account-player-card-form" onsubmit="saveAccountPlayerCard(event)">
                    <div class="account-player-card-grid">
                        <div class="form-field">
                            <label for="player-card-badge-select">Badge</label>
                            <select id="player-card-badge-select" title="Badge Player Card"${disabled}>
                                ${ACCOUNT_PLAYER_BADGE_OPTIONS.map(option => `
                                    <option value="${accountEscapeHtml(option.code)}" ${playerCard.badgeCode === option.code ? 'selected' : ''}>
                                        ${accountEscapeHtml(option.name)}
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                        <div class="form-field">
                            <label for="player-card-title-input">Title</label>
                            <input id="player-card-title-input" type="text" maxlength="60" value="${accountEscapeHtml(playerCard.title)}" placeholder="Nhập title ngắn cho Player Card" title="Title hiển thị trên Player Card"${disabled}>
                        </div>
                    </div>
                    <div class="account-player-card-actions">
                        <button type="submit" id="player-card-save-btn" class="profile-save-btn"${disabled}>${buttonLabel}</button>
                        <div class="profile-save-message${messageClass}" id="player-card-save-message" aria-live="polite">${accountEscapeHtml(accountPlayerCardMessage.text || '')}</div>
                    </div>
                    <p class="account-player-card-helper">Badge đang dùng preset gọn để giữ UI đồng nhất. Title tối đa 60 ký tự và sẽ phản ánh ngay trên Solo Ban/Pick sau khi lưu.</p>
                </form>
            `;
        }

        function renderAccountPlayerCardPanel(user) {
            let previewState = '';
            if (accountPlayerCardState.loading && !accountPlayerCardState.loaded) {
                previewState = '<div class="account-player-card-state">Đang tải Player Card...</div>';
            } else if (accountPlayerCardState.error) {
                previewState = '<div class="account-player-card-state">' + accountEscapeHtml(accountPlayerCardState.error) + '</div>';
            } else if (!accountPlayerCardState.profile) {
                previewState = '<div class="account-player-card-state">Player Card sẽ hiển thị khi dữ liệu hồ sơ solo sẵn sàng.</div>';
            }

            return `
                <aside class="side-panel account-player-card-panel">
                    <div class="account-player-card-head">
                        <h2 class="section-title">Player Card</h2>
                        <p>Dùng chung component với Solo Ban/Pick. Card chỉ hiển thị avatar, IGN, rank, ELO, badge và title.</p>
                    </div>
                    <div class="account-player-card-preview" id="account-player-card-preview">${previewState}</div>
                    ${renderAccountPlayerCardEditor(user)}
                    <p class="account-player-card-note">Stats W/L, win rate, most picked và recent drafts tiếp tục chỉ nằm ở Solo Ban/Pick.</p>
                </aside>
            `;
        }

        function renderAccountSidebar(user) {
            return `
                <div class="account-sidebar">
                    ${renderAccountPlayerCardPanel(user)}
                    ${renderAccountPersonalContentPanel()}
                </div>
            `;
        }

        function buildAccountPlayerCardData(user) {
            const profile = accountPlayerCardState.profile || {};
            const playerCard = profile.playerCard || {};
            const playerCardFormData = normalizeAccountPlayerCardFormData(user);
            return {
                ...playerCard,
                avatarUrl: playerCard.avatarUrl || user.picture || user.avatarUrl || '',
                displayName: playerCard.displayName || user.displayName || user.name || 'User',
                elo: playerCard.elo ?? profile?.stats?.rating ?? 0,
                badgeCode: playerCard.badgeCode || playerCardFormData.badgeCode,
                badgeName: playerCard.badgeName || playerCardFormData.badgeName,
                badgeIconUrl: playerCard.badgeIconUrl || playerCardFormData.badgeIconUrl,
                title: playerCard.title || playerCardFormData.title,
                variant: 'account-preview'
            };
        }

        function renderAccountPlayerCardPreview(user) {
            const container = document.getElementById('account-player-card-preview');
            if (!container || !window.ATGPlayerCard || typeof window.ATGPlayerCard.renderPlayerCard !== 'function') {
                return;
            }
            if (!accountPlayerCardState.loaded || accountPlayerCardState.error || !accountPlayerCardState.profile) {
                return;
            }

            window.ATGPlayerCard.renderPlayerCard(container, buildAccountPlayerCardData(user));
        }

        async function loadAccountContentSummary() {
            if (accountContentState.loading || accountContentState.loaded) {
                return;
            }

            accountContentState.loading = true;
            accountContentState.error = '';
            renderAccountPage();

            try {
                const response = await fetch('/api/users/me/content-summary', {
                    headers: { Accept: 'application/json' },
                    cache: 'no-store'
                });
                if (!response.ok) {
                    throw new Error(await readAccountApiMessage(response, 'Không thể tải nội dung của bạn.'));
                }
                accountContentState.summary = normalizeAccountContentSummary(await response.json());
                accountContentState.loaded = true;
            } catch (error) {
                accountContentState.error = error.message || 'Không thể tải nội dung của bạn.';
                accountContentState.loaded = true;
            } finally {
                accountContentState.loading = false;
                renderAccountPage();
            }
        }

        async function loadAccountPlayerCardProfile(options) {
            const settings = options || {};
            if (accountPlayerCardState.loading || (accountPlayerCardState.loaded && !settings.force)) {
                return;
            }

            accountPlayerCardState.loading = true;
            accountPlayerCardState.error = '';
            renderAccountPage();

            try {
                const response = await fetch('/api/ban-pick/profile', {
                    headers: { Accept: 'application/json' },
                    cache: 'no-store'
                });
                if (!response.ok) {
                    throw new Error(await readAccountApiMessage(response, 'Không thể tải Player Card.'));
                }
                accountPlayerCardState.profile = await response.json();
                accountPlayerCardState.loaded = true;
            } catch (error) {
                accountPlayerCardState.error = error.message || 'Không thể tải Player Card.';
                accountPlayerCardState.loaded = true;
                accountPlayerCardState.profile = null;
            } finally {
                accountPlayerCardState.loading = false;
                renderAccountPage();
            }
        }

        function syncAccountPlayerCardPreviewFromProfile(profile) {
            if (!profile) {
                return;
            }

            accountPlayerCardState.draft = null;
            accountPlayerCardState.error = '';
            accountPlayerCardState.loaded = true;
            const existingProfile = accountPlayerCardState.profile || {};
            accountPlayerCardState.profile = {
                ...existingProfile,
                playerCard: {
                    ...(existingProfile.playerCard || {}),
                    badgeCode: profile.playerBadgeCode || 'default',
                    badgeName: profile.playerBadgeName || 'ATG Player',
                    badgeIconUrl: profile.playerBadgeIconUrl || '',
                    title: profile.playerTitle || ACCOUNT_PLAYER_CARD_DEFAULT_TITLE
                }
            };
        }

        function showAccountContentList(type) {
            accountContentState.activeList = accountContentState.activeList === type ? '' : type;
            renderAccountPage();
            if (!accountContentState.loaded && !accountContentState.loading) {
                loadAccountContentSummary();
            }
        }

        function hideAccountContentList() {
            accountContentState.activeList = '';
            renderAccountPage();
        }

        function renderAccountPage() {
            const user = getAuthUser();
            if (!user) {
                window.location.replace('/html/index.html');
                return;
            }
            ensureAccountContentStateFor(user);
            ensureAccountPlayerCardStateFor(user);

            const root = document.getElementById('account-dashboard-root');
            const displayNameRaw = user.displayName || user.name || 'User';
            const formattedName = accountEscapeHtml(formatAccountDisplayName(user));
            const displayName = accountEscapeHtml(displayNameRaw);
            const email = accountEscapeHtml(user.email || '');
            const role = accountEscapeHtml(user.role || 'User');
            const level = accountEscapeHtml(user.level || 'Normal');
            const levelLabel = level === 'Normal' ? 'Normal' : level;
            const isAdmin = user.role === 'Admin';

            root.innerHTML = `
                <div class="account-hero">
                    <div class="account-avatar" aria-hidden="true">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="account-identity">
                        <div class="account-name">${formattedName}</div>
                        <div class="account-email">${email}</div>
                    </div>
                    <span class="role-badge">${role}</span>
                </div>

                <div class="account-content">
                    <div>
                        <h2 class="section-title">Tổng quan</h2>
                        <div class="stat-grid">
                            <div class="stat-card">
                                <span class="stat-label">Tên hiển thị</span>
                                <div class="stat-value">${formattedName}</div>
                            </div>
                            <div class="stat-card">
                                <span class="stat-label">Vai trò</span>
                                <div class="stat-value">${role}</div>
                            </div>
                            <div class="stat-card wide">
                                <span class="stat-label">Cấp độ</span>
                                <div class="stat-value">${levelLabel}</div>
                            </div>
                        </div>

                        <form class="profile-form" onsubmit="saveAccountProfile(event)">
                            <div class="form-field">
                                <label for="display-name-input">Tên hiển thị</label>
                                <input id="display-name-input" type="text" maxlength="80" value="${displayName}" placeholder="Nhập tên hiển thị" title="Tên hiển thị của tài khoản">
                            </div>
                            <div class="form-field">
                                <label for="account-level-select">Cấp độ</label>
                                <select id="account-level-select" title="Cấp độ tài khoản">
                                    <option value="Normal" ${user.level === 'Normal' ? 'selected' : ''}>Normal</option>
                                    <option value="Vip" ${user.level === 'Vip' ? 'selected' : ''}>Vip</option>
                                </select>
                            </div>
                            <button type="submit" id="profile-save-btn" class="profile-save-btn">Lưu hiển thị</button>
                            <div class="profile-save-message${accountProfileMessage.text ? (accountProfileMessage.type === 'error' ? ' is-error' : ' is-success') : ''}" id="profile-save-message" aria-live="polite">${accountEscapeHtml(accountProfileMessage.text || '')}</div>
                        </form>

                        <h2 class="section-title" style="margin-top:24px;">Lối tắt</h2>
                        <div class="action-grid">
                            <a href="/html/tier-list.html" class="action-card">
                                <span class="action-icon">TL</span>
                                <span>
                                    <strong>Tier List</strong>
                                    <small>Tạo và đánh giá bảng xếp hạng</small>
                                </span>
                            </a>
                            <a href="/html/giao-an.html" class="action-card">
                                <span class="action-icon">GD</span>
                                <span>
                                    <strong>Giáo án</strong>
                                    <small>Xây dựng chiến thuật cá nhân</small>
                                </span>
                            </a>
                            <a href="/html/esports.html" class="action-card">
                                <span class="action-icon">ER</span>
                                <span>
                                    <strong>Esports</strong>
                                    <small>Theo dõi BXH và chỉ số đội</small>
                                </span>
                            </a>
                            ${isAdmin ? `
                            <a href="/html/admin.html" class="action-card admin-action">
                                <span class="action-icon">AD</span>
                                <span>
                                    <strong>Admin Panel</strong>
                                    <small>Quản trị dữ liệu hệ thống</small>
                                </span>
                            </a>` : ''}
                        </div>
                    </div>

                    ${renderAccountSidebar(user)}
                </div>
            `;
            renderAccountPlayerCardPreview(user);
            if (!accountContentState.loaded && !accountContentState.loading) {
                loadAccountContentSummary();
            }
            if (!accountPlayerCardState.loaded && !accountPlayerCardState.loading) {
                loadAccountPlayerCardProfile();
            }
        }

        async function readAccountApiMessage(response, fallbackMessage) {
            try {
                const payload = await response.json();
                if (payload && typeof payload.message === 'string' && payload.message.trim()) {
                    return payload.message.trim();
                }
            } catch (error) {
                // Fall back to the default message when the API response is not JSON.
            }
            return fallbackMessage;
        }

        async function saveAccountProfile(event) {
            event.preventDefault();

            const submitButton = document.getElementById('profile-save-btn');
            const displayName = document.getElementById('display-name-input')?.value?.trim() || '';
            const level = document.getElementById('account-level-select')?.value || 'Normal';
            setAccountProfileMessage('', 'success');

            if (!displayName) {
                setAccountProfileMessage('Tên hiển thị không được để trống.', 'error');
                renderAccountPage();
                return;
            }

            if (submitButton) {
                submitButton.disabled = true;
            }

            try {
                const response = await fetch('/api/users/me/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        displayName: displayName,
                        level: level
                    })
                });

                if (!response.ok) {
                    throw new Error(await readAccountApiMessage(response, 'Không thể lưu tên hiển thị.'));
                }

                const profile = await response.json();
                setAccountProfileMessage('Đã lưu tên hiển thị.', 'success');
                syncAccountPlayerCardPreviewFromProfile(profile);
                applyAuthUserProfile(profile);
            } catch (error) {
                setAccountProfileMessage(error.message || 'Không thể lưu tên hiển thị.', 'error');
                renderAccountPage();
            } finally {
                if (submitButton) {
                    submitButton.disabled = false;
                }
            }
        }

        async function saveAccountPlayerCard(event) {
            event.preventDefault();

            const user = getAuthUser();
            if (!user) {
                window.location.replace('/html/index.html');
                return;
            }

            const badgeOption = findAccountPlayerBadgeOption(
                document.getElementById('player-card-badge-select')?.value || user.playerBadgeCode
            );
            const titleValue = document.getElementById('player-card-title-input')?.value || '';

            accountPlayerCardState.saving = true;
            accountPlayerCardState.draft = {
                badgeCode: badgeOption.code,
                badgeName: badgeOption.name,
                badgeIconUrl: badgeOption.iconUrl || '',
                title: titleValue
            };
            setAccountPlayerCardMessage('', 'success');
            renderAccountPage();

            try {
                const response = await fetch('/api/users/me/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        displayName: user.displayName || user.name || 'User',
                        level: user.level || 'Normal',
                        playerBadgeCode: badgeOption.code,
                        playerBadgeName: badgeOption.name,
                        playerBadgeIconUrl: badgeOption.iconUrl || '',
                        playerTitle: titleValue
                    })
                });

                if (!response.ok) {
                    throw new Error(await readAccountApiMessage(response, 'Khong the luu Player Card.'));
                }

                const profile = await response.json();
                syncAccountPlayerCardPreviewFromProfile(profile);
                applyAuthUserProfile(profile);
                setAccountPlayerCardMessage('Da luu Player Card.', 'success');
                await loadAccountPlayerCardProfile({ force: true });
            } catch (error) {
                setAccountPlayerCardMessage(error.message || 'Khong the luu Player Card.', 'error');
                renderAccountPage();
            } finally {
                accountPlayerCardState.saving = false;
                renderAccountPage();
            }
        }

        function logoutFromAccountPage() {
            handleLogout();
            window.location.replace('/html/index.html');
        }

        document.addEventListener('authChanged', function(event) {
            if (!event.detail || !event.detail.user) {
                window.location.replace('/html/index.html');
                return;
            }
            renderAccountPage();
        });

        async function initializeAccountPage() {
            renderAccountPage();
            await refreshAuthUserProfile({ silent: true });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAccountPage);
        } else {
            initializeAccountPage();
        }
    </script>
</body>
</html>
