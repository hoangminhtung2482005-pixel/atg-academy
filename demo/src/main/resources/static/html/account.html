<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Dashboard - ATG Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background: #f8fafc;
            color: #0f172a;
            font-family: 'Inter', sans-serif;
        }
        .account-page {
            min-height: calc(100vh - 64px);
            padding: 36px 16px 56px;
        }
        .account-shell {
            margin: 0 auto;
            max-width: 1040px;
        }
        .account-heading {
            align-items: flex-end;
            display: flex;
            gap: 18px;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .account-heading h1 {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            font-weight: 800;
            letter-spacing: 0;
            line-height: 1.1;
        }
        .account-heading p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 8px;
        }
        .account-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .account-hero {
            align-items: center;
            background: linear-gradient(135deg, #eff6ff 0%, #ffffff 58%, #ecfdf5 100%);
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            gap: 18px;
            padding: 26px;
        }
        .account-avatar {
            align-items: center;
            background: #ffffff;
            border: 1px solid #bfdbfe;
            border-radius: 18px;
            color: #2563eb;
            display: flex;
            flex-shrink: 0;
            height: 68px;
            justify-content: center;
            width: 68px;
        }
        .account-identity {
            min-width: 0;
        }
        .account-name {
            font-size: 1.35rem;
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .account-email {
            color: #64748b;
            font-size: 0.92rem;
            margin-top: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .role-badge {
            background: #ecfdf5;
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            color: #047857;
            font-size: 0.78rem;
            font-weight: 800;
            margin-left: auto;
            padding: 7px 12px;
            text-transform: uppercase;
        }
        .account-content {
            display: grid;
            gap: 22px;
            grid-template-columns: minmax(0, 1fr) 320px;
            padding: 24px;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .stat-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .stat-card {
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 16px;
        }
        .stat-card.wide {
            grid-column: 1 / -1;
        }
        .stat-label {
            color: #64748b;
            display: block;
            font-size: 0.73rem;
            font-weight: 800;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .stat-value {
            color: #0f172a;
            font-size: 1rem;
            font-weight: 800;
        }
        .profile-form {
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            display: grid;
            gap: 14px;
            grid-template-columns: minmax(0, 1fr) 180px auto;
            margin-top: 18px;
            padding: 16px;
        }
        .form-field label {
            color: #64748b;
            display: block;
            font-size: 0.73rem;
            font-weight: 800;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .form-field input,
        .form-field select {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            color: #0f172a;
            font-size: 0.92rem;
            font-weight: 600;
            outline: none;
            padding: 10px 12px;
            width: 100%;
        }
        .form-field input:focus,
        .form-field select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
        }
        .profile-save-btn {
            align-self: end;
            background: #2563eb;
            border: 1px solid #2563eb;
            border-radius: 10px;
            color: #ffffff;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 800;
            padding: 10px 14px;
            white-space: nowrap;
        }
        .profile-save-message {
            font-size: 0.82rem;
            font-weight: 700;
            grid-column: 1 / -1;
            min-height: 18px;
        }
        .profile-save-message.is-success {
            color: #059669;
        }
        .profile-save-message.is-error {
            color: #dc2626;
        }
        .profile-save-btn:disabled {
            cursor: wait;
            opacity: 0.7;
        }
        .action-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .action-card {
            align-items: center;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            color: #0f172a;
            display: flex;
            gap: 12px;
            min-height: 86px;
            padding: 16px;
            text-decoration: none;
            transition: all 0.18s ease;
        }
        .action-card:hover {
            background: #eff6ff;
            border-color: #2563eb;
            transform: translateY(-1px);
        }
        .action-icon {
            align-items: center;
            background: #f1f5f9;
            border-radius: 12px;
            color: #2563eb;
            display: flex;
            flex-shrink: 0;
            font-size: 0.75rem;
            font-weight: 900;
            height: 42px;
            justify-content: center;
            width: 42px;
        }
        .action-card strong {
            display: block;
            font-size: 0.95rem;
        }
        .action-card small {
            color: #64748b;
            display: block;
            font-size: 0.8rem;
            line-height: 1.35;
            margin-top: 3px;
        }
        .action-card.admin-action {
            background: #fffbeb;
            border-color: #facc15;
        }
        .side-panel {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 18px;
        }
        .session-list {
            display: grid;
            gap: 12px;
        }
        .session-row {
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .session-row:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }
        .session-row span {
            color: #64748b;
            display: block;
            font-size: 0.76rem;
            font-weight: 800;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .session-row strong {
            display: block;
            font-size: 0.9rem;
            overflow-wrap: anywhere;
        }
        .button-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }
        .secondary-btn,
        .danger-btn {
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            padding: 10px 15px;
        }
        .secondary-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: #334155;
        }
        .danger-btn {
            background: #ef4444;
            border: 1px solid #ef4444;
            color: #ffffff;
        }
        .loading-state {
            color: #64748b;
            padding: 42px;
            text-align: center;
        }
        @media (max-width: 860px) {
            .account-heading,
            .account-hero {
                align-items: flex-start;
                flex-direction: column;
            }
            .role-badge {
                margin-left: 0;
            }
            .account-content {
                grid-template-columns: 1fr;
            }
            .action-grid,
            .stat-grid,
            .profile-form {
                grid-template-columns: 1fr;
            }
            .profile-save-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="account-page">
        <div class="account-shell">
            <div class="account-heading">
                <div>
                    <h1>Account Dashboard</h1>
                    <p>Quản lý tên hiển thị, cấp độ và các lối tắt dành cho tài khoản của bạn.</p>
                </div>
                <button type="button" class="danger-btn" onclick="logoutFromAccountPage()">Đăng xuất</button>
            </div>

            <section class="account-card" id="account-dashboard-root">
                <div class="loading-state">Đang tải thông tin tài khoản...</div>
            </section>
        </div>
    </main>

    <script src="/js/auth.js?v=20260424-account-profile"></script>
    <script src="/js/header-loader.js?v=20260424-account-profile"></script>
    <script>
        const accountProfileMessage = {
            text: '',
            type: 'success'
        };

        function accountEscapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function setAccountProfileMessage(text, type) {
            accountProfileMessage.text = text || '';
            accountProfileMessage.type = type === 'error' ? 'error' : 'success';
        }

        function renderAccountPage() {
            const user = getAuthUser();
            if (!user) {
                window.location.replace('/html/index.html');
                return;
            }

            const root = document.getElementById('account-dashboard-root');
            const displayNameRaw = user.displayName || user.name || 'User';
            const formattedName = accountEscapeHtml(formatAccountDisplayName(user));
            const displayName = accountEscapeHtml(displayNameRaw);
            const email = accountEscapeHtml(user.email || '');
            const role = accountEscapeHtml(user.role || 'User');
            const level = accountEscapeHtml(user.level || 'Normal');
            const levelLabel = level === 'Normal' ? 'Normal' : level;
            const isAdmin = user.role === 'Admin';

            root.innerHTML = `
                <div class="account-hero">
                    <div class="account-avatar" aria-hidden="true">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="account-identity">
                        <div class="account-name">${formattedName}</div>
                        <div class="account-email">${email}</div>
                    </div>
                    <span class="role-badge">${role}</span>
                </div>

                <div class="account-content">
                    <div>
                        <h2 class="section-title">Tổng quan</h2>
                        <div class="stat-grid">
                            <div class="stat-card">
                                <span class="stat-label">Tên hiển thị</span>
                                <div class="stat-value">${formattedName}</div>
                            </div>
                            <div class="stat-card">
                                <span class="stat-label">Vai trò</span>
                                <div class="stat-value">${role}</div>
                            </div>
                            <div class="stat-card wide">
                                <span class="stat-label">Cấp độ</span>
                                <div class="stat-value">${levelLabel}</div>
                            </div>
                        </div>

                        <form class="profile-form" onsubmit="saveAccountProfile(event)">
                            <div class="form-field">
                                <label for="display-name-input">Tên hiển thị</label>
                                <input id="display-name-input" type="text" maxlength="80" value="${displayName}" placeholder="Nhập tên hiển thị" title="Tên hiển thị của tài khoản">
                            </div>
                            <div class="form-field">
                                <label for="account-level-select">Cấp độ</label>
                                <select id="account-level-select" title="Cấp độ tài khoản">
                                    <option value="Normal" ${user.level === 'Normal' ? 'selected' : ''}>Normal</option>
                                    <option value="Vip" ${user.level === 'Vip' ? 'selected' : ''}>Vip</option>
                                </select>
                            </div>
                            <button type="submit" id="profile-save-btn" class="profile-save-btn">Lưu hiển thị</button>
                            <div class="profile-save-message${accountProfileMessage.text ? (accountProfileMessage.type === 'error' ? ' is-error' : ' is-success') : ''}" id="profile-save-message" aria-live="polite">${accountEscapeHtml(accountProfileMessage.text || '')}</div>
                        </form>

                        <h2 class="section-title" style="margin-top:24px;">Lối tắt</h2>
                        <div class="action-grid">
                            <a href="/html/tier-list.html" class="action-card">
                                <span class="action-icon">TL</span>
                                <span>
                                    <strong>Tier List</strong>
                                    <small>Tạo và đánh giá bảng xếp hạng</small>
                                </span>
                            </a>
                            <a href="/html/giao-an.html" class="action-card">
                                <span class="action-icon">GD</span>
                                <span>
                                    <strong>Giáo án</strong>
                                    <small>Xây dựng chiến thuật cá nhân</small>
                                </span>
                            </a>
                            <a href="/html/esports.html" class="action-card">
                                <span class="action-icon">ER</span>
                                <span>
                                    <strong>Esports</strong>
                                    <small>Theo dõi BXH và chỉ số đội</small>
                                </span>
                            </a>
                            ${isAdmin ? `
                            <a href="/html/admin.html" class="action-card admin-action">
                                <span class="action-icon">AD</span>
                                <span>
                                    <strong>Admin Panel</strong>
                                    <small>Quản trị dữ liệu hệ thống</small>
                                </span>
                            </a>` : ''}
                        </div>
                    </div>

                    <aside class="side-panel">
                        <h2 class="section-title">Thông tin tài khoản</h2>
                        <div class="session-list">
                            <div class="session-row">
                                <span>Tên hiển thị</span>
                                <strong>${formattedName}</strong>
                            </div>
                            <div class="session-row">
                                <span>Cấp độ</span>
                                <strong>${levelLabel}</strong>
                            </div>
                            <div class="session-row">
                                <span>Email</span>
                                <strong>${email}</strong>
                            </div>
                            <div class="session-row">
                                <span>Provider</span>
                                <strong>Google Identity Services</strong>
                            </div>
                            <div class="session-row">
                                <span>JWT</span>
                                <strong>Đang dùng Google ID token</strong>
                            </div>
                        </div>
                        <div class="button-row">
                            <button type="button" class="secondary-btn" onclick="window.location.href='/html/index.html'">Về trang chủ</button>
                            <button type="button" class="danger-btn" onclick="logoutFromAccountPage()">Đăng xuất</button>
                        </div>
                    </aside>
                </div>
            `;
        }

        async function readAccountApiMessage(response, fallbackMessage) {
            try {
                const payload = await response.json();
                if (payload && typeof payload.message === 'string' && payload.message.trim()) {
                    return payload.message.trim();
                }
            } catch (error) {
                // Fall back to the default message when the API response is not JSON.
            }
            return fallbackMessage;
        }

        async function saveAccountProfile(event) {
            event.preventDefault();

            const submitButton = document.getElementById('profile-save-btn');
            const displayName = document.getElementById('display-name-input')?.value?.trim() || '';
            const level = document.getElementById('account-level-select')?.value || 'Normal';
            setAccountProfileMessage('', 'success');

            if (!displayName) {
                setAccountProfileMessage('Tên hiển thị không được để trống.', 'error');
                renderAccountPage();
                return;
            }

            if (submitButton) {
                submitButton.disabled = true;
            }

            try {
                const response = await fetch('/api/users/me/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        displayName: displayName,
                        level: level
                    })
                });

                if (!response.ok) {
                    throw new Error(await readAccountApiMessage(response, 'Không thể lưu tên hiển thị.'));
                }

                const profile = await response.json();
                setAccountProfileMessage('Đã lưu tên hiển thị.', 'success');
                applyAuthUserProfile(profile);
            } catch (error) {
                setAccountProfileMessage(error.message || 'Không thể lưu tên hiển thị.', 'error');
                renderAccountPage();
            } finally {
                if (submitButton) {
                    submitButton.disabled = false;
                }
            }
        }

        function logoutFromAccountPage() {
            handleLogout();
            window.location.replace('/html/index.html');
        }

        document.addEventListener('authChanged', function(event) {
            if (!event.detail || !event.detail.user) {
                window.location.replace('/html/index.html');
                return;
            }
            renderAccountPage();
        });

        async function initializeAccountPage() {
            renderAccountPage();
            await refreshAuthUserProfile({ silent: true });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeAccountPage);
        } else {
            initializeAccountPage();
        }
    </script>
</body>
</html>
