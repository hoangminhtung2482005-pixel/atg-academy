<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki - ATG Academy</title>
    <meta name="description" content="Thư viện Wiki Liên Quân Mobile — tra cứu thông tin Tướng, Phù hiệu và Bổ trợ.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css?v=20260507-css-modules">
    <link rel="stylesheet" href="/css/wiki.css?v=20260509-enchantments">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="wiki-root">
        <div class="wiki-container">
            <!-- Page Header -->
            <div class="mb-2">
                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">📖 Wiki</h1>
                <p class="text-slate-500 text-sm mt-1">Thu vi?n tra c?u th?ng tin Li?n Qu?n Mobile</p>
            </div>

            <!-- Tab Navigation -->
            <nav class="wiki-tabs" id="wiki-tabs" role="tablist" aria-label="Danh mục Wiki">
                <button class="wiki-tab active" data-tab="heroes" role="tab" aria-selected="true">
                    <span class="wiki-tab-icon">⚔️</span> Tướng
                </button>
                <button class="wiki-tab" data-tab="spells" role="tab" aria-selected="false">
                    <span class="wiki-tab-icon">✨</span> Bổ trợ
                </button>
                <button class="wiki-tab" data-tab="enchantments" role="tab" aria-selected="false">
                    <span class="wiki-tab-icon">🔮</span> Phù hiệu
                </button>
            </nav>

            <!-- Tab Content -->
            <div id="wiki-content"></div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        const HERO_API = '/api/wiki/heroes';
        const SPELLS_API = '/api/spells';
        const ENCHANTMENTS_API = '/api/enchantments';
        const DEFAULT_TAB = 'heroes';
        const TAB_PAGE_MAP = {
            heroes: 'wiki-home',
            spells: 'wiki-spells',
            enchantments: 'wiki-enchantments'
        };

        let heroesData = [];
        let spellsData = [];
        let enchantmentsData = [];
        let activeTab = DEFAULT_TAB;
        let activeClassFilter = 'all';
        let activeRoleFilter = 'all';
        let spellsLoading = false;
        let spellsReady = false;
        let enchantmentsLoading = false;
        let enchantmentsReady = false;

        const HERO_CLASS_FILTERS = ['Đấu sĩ', 'Sát thủ', 'Pháp sư', 'Xạ thủ', 'Đỡ đòn', 'Trợ thủ'];
        const ROLE_FILTERS = [
            { code: 'DSL', label: 'Đường Tà Thần', icon: '/images/ui/top.png' },
            { code: 'JGL', label: 'Đi Rừng', icon: '/images/ui/jungle.png' },
            { code: 'MID', label: 'Đường Giữa', icon: '/images/ui/mid.png' },
            { code: 'ADL', label: 'Đường Rồng', icon: '/images/ui/adc.png' },
            { code: 'SUP', label: 'Trợ Thủ', icon: '/images/ui/support.png' }
        ];

        // ==================== TAB MANAGEMENT ====================

        function normalizeTabId(value) {
            var normalized = String(value || '').trim().toLowerCase();
            return TAB_PAGE_MAP[normalized] ? normalized : DEFAULT_TAB;
        }

        function getTabFromUrl() {
            var url = new URL(window.location.href);
            return normalizeTabId(url.searchParams.get('tab'));
        }

        function syncTabToUrl(tabId) {
            var url = new URL(window.location.href);
            if (tabId === DEFAULT_TAB) {
                url.searchParams.delete('tab');
            } else {
                url.searchParams.set('tab', tabId);
            }
            window.history.replaceState({}, '', url.pathname + url.search + url.hash);
        }

        function updateTabButtons() {
            var tabContainer = document.getElementById('wiki-tabs');
            if (!tabContainer) return;

            tabContainer.querySelectorAll('.wiki-tab').forEach(function (btn) {
                var isActive = btn.getAttribute('data-tab') === activeTab;
                btn.classList.toggle('active', isActive);
                btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
            });
        }

        function setActiveTab(tabId, options) {
            var nextTab = normalizeTabId(tabId);
            var shouldSyncUrl = !options || options.syncUrl !== false;
            var shouldRender = !options || options.render !== false;

            activeTab = nextTab;
            updateTabButtons();

            if (shouldSyncUrl) {
                syncTabToUrl(nextTab);
            }

            if (shouldRender) {
                renderActiveTab();
            }
        }

        function initTabs() {
            const tabContainer = document.getElementById('wiki-tabs');
            if (!tabContainer) return;

            tabContainer.addEventListener('click', function (event) {
                const tabButton = event.target.closest('.wiki-tab');
                if (!tabButton) return;

                const tabId = tabButton.getAttribute('data-tab');
                if (tabId === activeTab) return;
                setActiveTab(tabId);
            });
        }

        function renderActiveTab() {
            if (activeTab === 'heroes') {
                renderHeroesTab();
            } else if (activeTab === 'spells') {
                renderSpellsTab();
            } else {
                renderEnchantmentsTab();
            }
        }

        // ==================== HEROES TAB ====================

        function renderHeroesTab() {
            const content = document.getElementById('wiki-content');
            if (!content) return;

            if (heroesData.length === 0) {
                content.innerHTML = buildSkeletonGrid();
                fetchHeroes();
                return;
            }

            content.innerHTML = buildHeroSearchBar() + buildHeroFilters() + buildHeroCountBadge(heroesData.length) + '<div class="wiki-hero-grid" id="hero-grid"></div>';
            applyHeroFilters();
            attachHeroFilterListeners();
        }

        async function fetchHeroes() {
            const content = document.getElementById('wiki-content');
            try {
                const response = await fetch(HERO_API, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error('HTTP ' + response.status);

                const heroes = await response.json();
                if (!Array.isArray(heroes)) throw new Error('Invalid payload');

                heroesData = heroes;

                if (activeTab !== 'heroes') return;

                if (heroesData.length === 0) {
                    content.innerHTML = buildEmptyState('⚔️', 'Chưa có dữ liệu tướng', 'Danh sách tướng sẽ xuất hiện khi database có dữ liệu.');
                    return;
                }

                content.innerHTML = buildHeroSearchBar() + buildHeroFilters() + buildHeroCountBadge(heroesData.length) + '<div class="wiki-hero-grid" id="hero-grid"></div>';
                applyHeroFilters();
                attachHeroFilterListeners();

            } catch (error) {
                console.error('Wiki hero fetch error:', error);
                if (activeTab === 'heroes' && content) {
                    content.innerHTML = buildEmptyState('❌', 'Không thể tải dữ liệu', 'Vui lòng kiểm tra kết nối server và thử tải lại trang.');
                }
            }
        }

        function renderHeroGrid(heroes) {
            const grid = document.getElementById('hero-grid');
            if (!grid) return;

            if (heroes.length === 0) {
                grid.innerHTML = '<div class="wiki-state" style="grid-column:1/-1"><div class="wiki-state-icon">🔍</div><div class="wiki-state-title">Không tìm thấy tướng nào</div><div class="wiki-state-text">Thử tìm kiếm với từ khóa khác.</div></div>';
                return;
            }

            grid.innerHTML = heroes.map(function (hero) {
                var avatarHtml;
                if (hero.avatarUrl) {
                    avatarHtml = '<img src="' + escapeHtml(hero.avatarUrl) + '" alt="' + escapeHtml(hero.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                                 '<span class="avatar-fallback" style="display:none">' + escapeHtml((hero.name || '?').charAt(0)) + '</span>';
                } else {
                    avatarHtml = '<span class="avatar-fallback">' + escapeHtml((hero.name || '?').charAt(0)) + '</span>';
                }

                var primaryRole = getHeroPrimaryRole(hero);
                var subRoles = getHeroSubRoles(hero);
                // heroClass (Chất tướng)
                var heroClasses = Array.isArray(hero.classes) && hero.classes.length
                    ? hero.classes
                    : (hero.heroClass ? [hero.heroClass] : []);
                // attributes is an array
                var attrsArr = Array.isArray(hero.attributes) ? hero.attributes : [];

                var metaLines = '<div class="wiki-hero-badges">';
                heroClasses.forEach(function (heroClass) {
                    metaLines += '<span class="wiki-badge class">' + escapeHtml(heroClass) + '</span>';
                });
                if (primaryRole) {
                    metaLines += '<span class="wiki-badge lane primary" title="' + escapeHtml(primaryRole.name || getRoleLabel(primaryRole.code) || primaryRole.code) + '">Primary: ' + escapeHtml(primaryRole.code || primaryRole.name) + '</span>';
                }
                subRoles.forEach(function (role) {
                    metaLines += '<span class="wiki-badge lane sub" title="' + escapeHtml(role.name || getRoleLabel(role.code) || role.code) + '">Sub: ' + escapeHtml(role.code || role.name) + '</span>';
                });
                attrsArr.forEach(function (attribute) { metaLines += '<span class="wiki-badge attr">' + escapeHtml(attribute) + '</span>'; });
                metaLines += '</div>';

                return '<div class="wiki-hero-card">' +
                    '<div class="wiki-hero-avatar-wrap">' + avatarHtml + '</div>' +
                    '<div class="wiki-hero-name">' + escapeHtml(hero.name || 'Unknown') + '</div>' +
                    metaLines +
                '</div>';
            }).join('');
        }

        function attachHeroFilterListeners() {
            var input = document.getElementById('wiki-hero-search');
            if (input) {
                input.addEventListener('input', applyHeroFilters);
            }

            document.querySelectorAll('[data-class-filter]').forEach(function (button) {
                button.addEventListener('click', function () {
                    activeClassFilter = button.getAttribute('data-class-filter') || 'all';
                    updateHeroFilterButtons();
                    applyHeroFilters();
                });
            });

            document.querySelectorAll('[data-role-filter]').forEach(function (button) {
                button.addEventListener('click', function () {
                    activeRoleFilter = button.getAttribute('data-role-filter') || 'all';
                    updateHeroFilterButtons();
                    applyHeroFilters();
                });
            });

            var resetButton = document.getElementById('wiki-filter-reset');
            if (resetButton) {
                resetButton.addEventListener('click', function () {
                    activeClassFilter = 'all';
                    activeRoleFilter = 'all';
                    if (input) input.value = '';
                    updateHeroFilterButtons();
                    applyHeroFilters();
                });
            }

            updateHeroFilterButtons();
        }

        function applyHeroFilters() {
            var input = document.getElementById('wiki-hero-search');
            var keyword = normalize(input ? input.value : '');
            var filtered = heroesData.filter(function (hero) {
                var roleCodes = getHeroRoleCodes(hero);
                var laneRoles = getHeroLaneRoleLabels(hero);
                var attrsStr = Array.isArray(hero.attributes) ? hero.attributes.join(' ') : '';
                var classNames = Array.isArray(hero.classes) && hero.classes.length
                    ? hero.classes
                    : (hero.heroClass ? [hero.heroClass] : []);
                var classStr = classNames.join(' ');

                var matchesSearch = !keyword ||
                    normalize(hero.name || '').includes(keyword) ||
                    normalize(roleCodes.join(' ')).includes(keyword) ||
                    normalize(laneRoles.join(' ')).includes(keyword) ||
                    normalize(classStr).includes(keyword) ||
                    normalize(attrsStr).includes(keyword);

                var matchesClass = activeClassFilter === 'all' || classNames.some(function (heroClass) {
                    return normalize(heroClass) === normalize(activeClassFilter);
                });
                var primaryRoleCode = getHeroPrimaryRoleCode(hero);
                var matchesRole = activeRoleFilter === 'all'
                    || primaryRoleCode === activeRoleFilter
                    || (!primaryRoleCode && roleCodes.includes(activeRoleFilter));

                return matchesSearch && matchesClass && matchesRole;
            });

            renderHeroGrid(filtered);
            updateHeroCount(filtered.length);
        }

        function updateHeroFilterButtons() {
            document.querySelectorAll('[data-class-filter]').forEach(function (button) {
                button.classList.toggle('active', button.getAttribute('data-class-filter') === activeClassFilter);
            });
            document.querySelectorAll('[data-role-filter]').forEach(function (button) {
                button.classList.toggle('active', button.getAttribute('data-role-filter') === activeRoleFilter);
            });
        }

        function updateHeroCount(count) {
            var countEl = document.getElementById('wiki-hero-count');
            if (countEl) countEl.textContent = '⚔️ ' + count + ' tướng';
        }

        // ==================== SPELLS TAB ====================

        function renderSpellsTab() {
            var content = document.getElementById('wiki-content');
            if (!content) return;

            if (!spellsReady) {
                content.innerHTML = buildSpellSkeletonGrid();
                if (!spellsLoading) {
                    fetchSpells();
                }
                return;
            }

            if (spellsData.length === 0) {
                content.innerHTML = buildEmptyState('✨', 'Chưa có dữ liệu Bổ trợ', 'Danh sách Bổ trợ sẽ xuất hiện khi file JSON có dữ liệu.');
                return;
            }

            content.innerHTML = buildSpellIntro() + buildSpellCountBadge(spellsData.length) + '<div class="wiki-spell-grid" id="spell-grid"></div>';
            renderSpellGrid(spellsData);
        }

        async function fetchSpells() {
            var content = document.getElementById('wiki-content');
            spellsLoading = true;

            try {
                var response = await fetch(SPELLS_API, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error('HTTP ' + response.status);

                var spells = await response.json();
                if (!Array.isArray(spells)) throw new Error('Invalid payload');

                spellsData = spells;
                spellsReady = true;

                if (activeTab === 'spells') {
                    renderSpellsTab();
                }
            } catch (error) {
                console.error('Wiki spell fetch error:', error);
                spellsReady = false;
                if (activeTab === 'spells' && content) {
                    content.innerHTML = buildEmptyState('❌', 'Không thể tải dữ liệu Bổ trợ', 'Vui lòng kiểm tra kết nối server và thử tải lại trang.');
                }
            } finally {
                spellsLoading = false;
            }
        }

        function renderSpellGrid(spells) {
            var grid = document.getElementById('spell-grid');
            if (!grid) return;

            grid.innerHTML = spells.map(function (spell) {
                var iconHtml;
                if (spell.iconUrl) {
                    iconHtml = '<img src="' + escapeHtml(spell.iconUrl) + '" alt="' + escapeHtml(spell.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                        '<span class="wiki-spell-fallback" style="display:none">' + escapeHtml((spell.name || '?').charAt(0)) + '</span>';
                } else {
                    iconHtml = '<span class="wiki-spell-fallback">' + escapeHtml((spell.name || '?').charAt(0)) + '</span>';
                }

                return '<div class="wiki-spell-card">' +
                    '<div class="wiki-spell-icon-wrap">' + iconHtml + '</div>' +
                    '<div class="wiki-spell-name">' + escapeHtml(spell.name || 'Unknown') + '</div>' +
                '</div>';
            }).join('');
        }

        // ==================== ENCHANTMENTS TAB ====================

        function renderEnchantmentsTab() {
            var content = document.getElementById('wiki-content');
            if (!content) return;

            if (!enchantmentsReady) {
                content.innerHTML = buildEnchantmentSkeletonGrid();
                if (!enchantmentsLoading) {
                    fetchEnchantments();
                }
                return;
            }

            if (enchantmentsData.length === 0) {
                content.innerHTML = buildEmptyState('🔮', 'Chưa có dữ liệu Phù hiệu', 'Danh sách Phù hiệu sẽ xuất hiện khi file JSON có dữ liệu.');
                return;
            }

            content.innerHTML = buildEnchantmentIntro()
                + buildEnchantmentCountBadge(enchantmentsData.length)
                + '<div class="wiki-enchantment-sections" id="enchantment-sections"></div>';
            renderEnchantmentSections(enchantmentsData);
        }

        async function fetchEnchantments() {
            var content = document.getElementById('wiki-content');
            enchantmentsLoading = true;

            try {
                var response = await fetch(ENCHANTMENTS_API, { headers: { 'Accept': 'application/json' } });
                if (!response.ok) throw new Error('HTTP ' + response.status);

                var enchantments = await response.json();
                if (!Array.isArray(enchantments)) throw new Error('Invalid payload');

                enchantmentsData = enchantments;
                enchantmentsReady = true;

                if (activeTab === 'enchantments') {
                    renderEnchantmentsTab();
                }
            } catch (error) {
                console.error('Wiki enchantment fetch error:', error);
                enchantmentsReady = false;
                if (activeTab === 'enchantments' && content) {
                    content.innerHTML = buildEmptyState('❌', 'Không thể tải dữ liệu Phù hiệu', 'Vui lòng kiểm tra kết nối server và thử tải lại trang.');
                }
            } finally {
                enchantmentsLoading = false;
            }
        }

        function renderEnchantmentSections(enchantments) {
            var container = document.getElementById('enchantment-sections');
            if (!container) return;

            var grouped = groupEnchantmentsByBranch(enchantments);
            container.innerHTML = grouped.map(function (group) {
                var sectionIcon = group.branchIconUrl
                    ? '<img src="' + escapeHtml(group.branchIconUrl) + '" alt="' + escapeHtml(group.branch) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                      '<span class="wiki-enchantment-branch-fallback" style="display:none">' + escapeHtml(getBranchInitial(group.branch)) + '</span>'
                    : '<span class="wiki-enchantment-branch-fallback">' + escapeHtml(getBranchInitial(group.branch)) + '</span>';

                return '<section class="wiki-enchantment-section">' +
                    '<div class="wiki-enchantment-section-head">' +
                        '<div class="wiki-enchantment-branch">' +
                            '<div class="wiki-enchantment-branch-icon">' + sectionIcon + '</div>' +
                            '<div>' +
                                '<div class="wiki-enchantment-branch-title">' + escapeHtml(group.branch) + '</div>' +
                                '<div class="wiki-enchantment-branch-text">Asset folder: /images/enchantments/' + escapeHtml(group.branchSlug || 'khac') + '/</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="wiki-enchantment-branch-count">' + group.items.length + ' phù hiệu</div>' +
                    '</div>' +
                    '<div class="wiki-enchantment-grid">' + group.items.map(buildEnchantmentCard).join('') + '</div>' +
                '</section>';
            }).join('');
        }

        function groupEnchantmentsByBranch(enchantments) {
            var groups = [];
            var lookup = new Map();

            enchantments.forEach(function (enchantment) {
                var branch = enchantment.branchName || enchantment.branch || 'Khác';
                var branchSlug = enchantment.branch || enchantment.branchSlug || normalize(branch).replace(/\s+/g, '-');
                if (!lookup.has(branchSlug)) {
                    var group = {
                        branch: branch,
                        branchSlug: branchSlug,
                        branchIconUrl: enchantment.branchIconUrl || ('/images/enchantments/' + branchSlug + '/' + branchSlug + '.webp'),
                        items: []
                    };
                    lookup.set(branchSlug, group);
                    groups.push(group);
                }

                lookup.get(branchSlug).items.push(enchantment);
            });

            return groups;
        }

        function buildEnchantmentCard(enchantment) {
            var iconHtml;
            if (enchantment.iconUrl) {
                iconHtml = '<img src="' + escapeHtml(enchantment.iconUrl) + '" alt="' + escapeHtml(enchantment.name) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                    '<span class="wiki-enchantment-fallback" style="display:none">' + escapeHtml((enchantment.name || '?').charAt(0)) + '</span>';
            } else {
                iconHtml = '<span class="wiki-enchantment-fallback">' + escapeHtml((enchantment.name || '?').charAt(0)) + '</span>';
            }

            var level = enchantment.level != null ? enchantment.level : enchantment.tier;
            var tierLabel = level ? 'Cấp ' + level : 'Chưa rõ cấp';
            var branchLabel = enchantment.branchName || enchantment.branch || 'Khác';

            return '<article class="wiki-enchantment-card">' +
                '<div class="wiki-enchantment-card-top">' +
                    '<div class="wiki-enchantment-icon-wrap">' + iconHtml + '</div>' +
                    '<span class="wiki-enchantment-pill tier">' + escapeHtml(tierLabel) + '</span>' +
                '</div>' +
                '<div class="wiki-enchantment-name">' + escapeHtml(enchantment.name || 'Unknown') + '</div>' +
                '<div class="wiki-enchantment-meta">' +
                    '<span class="wiki-enchantment-pill branch">' + escapeHtml(branchLabel) + '</span>' +
                '</div>' +
            '</article>';
        }

        // ==================== HTML BUILDERS ====================

        function buildHeroSearchBar() {
            return '<div class="wiki-search-bar">' +
                '<svg class="search-icon" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>' +
                '<input type="text" id="wiki-hero-search" placeholder="Tìm kiếm tướng theo tên, class hoặc vị trí..." autocomplete="off">' +
            '</div>';
        }

        function buildHeroFilters() {
            var classButtons = '<button class="wiki-filter-btn active" type="button" data-class-filter="all">Tất cả class</button>';
            HERO_CLASS_FILTERS.forEach(function (heroClass) {
                classButtons += '<button class="wiki-filter-btn" type="button" data-class-filter="' + escapeHtml(heroClass) + '">' + escapeHtml(heroClass) + '</button>';
            });

            var roleButtons = '<button class="wiki-filter-btn active" type="button" data-role-filter="all">Tất cả vị trí</button>';
            ROLE_FILTERS.forEach(function (role) {
                roleButtons += '<button class="wiki-filter-btn wiki-role-filter" type="button" data-role-filter="' + escapeHtml(role.code) + '" title="' + escapeHtml(role.label) + '">' +
                    '<img src="' + escapeHtml(role.icon) + '" alt="">' +
                    '<span>' + escapeHtml(role.code) + '</span>' +
                    '<small>' + escapeHtml(role.label) + '</small>' +
                '</button>';
            });

            return '<div class="wiki-filter-panel">' +
                '<div class="wiki-filter-group">' +
                    '<div class="wiki-filter-label">Class</div>' +
                    '<div class="wiki-filter-options">' + classButtons + '</div>' +
                '</div>' +
                '<div class="wiki-filter-group">' +
                    '<div class="wiki-filter-label">Vị trí đi đường</div>' +
                    '<div class="wiki-filter-options">' + roleButtons + '</div>' +
                '</div>' +
                '<div class="wiki-filter-footer">' +
                    '<button class="wiki-filter-reset" id="wiki-filter-reset" type="button">Xóa lọc</button>' +
                '</div>' +
            '</div>';
        }

        function buildHeroCountBadge(count) {
            return '<div class="wiki-hero-count" id="wiki-hero-count">⚔️ ' + count + ' tướng</div>';
        }

        function buildSpellIntro() {
            return '<div class="wiki-category-intro">' +
                '<div class="wiki-category-intro-icon">✨</div>' +
                '<div>' +
                    '<div class="wiki-category-intro-title">Bổ trợ</div>' +
                    '<div class="wiki-category-intro-text">Danh sách 12 bổ trợ được đọc từ JSON dùng chung cho Wiki và create-guide.</div>' +
                '</div>' +
            '</div>';
        }

        function buildSpellCountBadge(count) {
            return '<div class="wiki-spell-count">✨ ' + count + ' bổ trợ</div>';
        }

        function buildEnchantmentIntro() {
            return '<div class="wiki-category-intro">' +
                '<div class="wiki-category-intro-icon">🔮</div>' +
                '<div>' +
                    '<div class="wiki-category-intro-title">Phù hiệu</div>' +
                    '<div class="wiki-category-intro-text">Danh sách phù hiệu được đọc từ JSON, nhóm theo 4 nhánh và map trực tiếp sang asset tại /images/enchantments/...</div>' +
                '</div>' +
            '</div>';
        }

        function buildEnchantmentCountBadge(count) {
            return '<div class="wiki-enchantment-count">🔮 ' + count + ' phù hiệu</div>';
        }

        function buildSkeletonGrid() {
            var cards = '';
            for (var i = 0; i < 12; i++) {
                cards += '<div class="wiki-hero-card"><div class="skeleton" style="width:72px;height:72px;border-radius:50%;margin:0 auto 10px"></div><div class="skeleton" style="height:14px;width:70%;margin:0 auto 6px"></div><div class="skeleton" style="height:10px;width:50%;margin:0 auto"></div></div>';
            }
            return '<div class="wiki-hero-grid">' + cards + '</div>';
        }

        function buildSpellSkeletonGrid() {
            var cards = '';
            for (var i = 0; i < 12; i++) {
                cards += '<div class="wiki-spell-card"><div class="skeleton" style="width:64px;height:64px;border-radius:50%;margin:0 auto 12px"></div><div class="skeleton" style="height:14px;width:72%;margin:0 auto"></div></div>';
            }
            return buildSpellIntro() + '<div class="wiki-spell-grid">' + cards + '</div>';
        }

        function buildEnchantmentSkeletonGrid() {
            var cards = '';
            for (var i = 0; i < 8; i++) {
                cards += '<div class="wiki-enchantment-card"><div class="skeleton" style="width:72px;height:72px;border-radius:18px;margin:0 0 14px"></div><div class="skeleton" style="height:14px;width:78%;margin-bottom:10px"></div><div class="skeleton" style="height:12px;width:56%;margin-bottom:8px"></div><div class="skeleton" style="height:12px;width:42%"></div></div>';
            }
            return buildEnchantmentIntro() + '<div class="wiki-enchantment-grid">' + cards + '</div>';
        }

        function buildEmptyState(icon, title, text) {
            return '<div class="wiki-state"><div class="wiki-state-icon">' + icon + '</div><div class="wiki-state-title">' + escapeHtml(title) + '</div><div class="wiki-state-text">' + escapeHtml(text) + '</div></div>';
        }

        // ==================== UTILITIES ====================

        function getHeroPrimaryRole(hero) {
            if (hero && hero.primaryRole) {
                var primaryCode = normalizeRoleCode(hero.primaryRole.code || hero.primaryRole.name);
                return {
                    id: hero.primaryRole.id,
                    code: primaryCode || hero.primaryRole.code || '',
                    name: hero.primaryRole.name || getRoleLabel(primaryCode) || primaryCode
                };
            }
            var legacyCodes = [];
            if (Array.isArray(hero && hero.roles)) {
                hero.roles.forEach(function (role) {
                    var code = normalizeRoleCode(role);
                    if (code && legacyCodes.indexOf(code) === -1) legacyCodes.push(code);
                });
            }
            if (legacyCodes.length) {
                return {
                    code: legacyCodes[0],
                    name: getRoleLabel(legacyCodes[0]) || legacyCodes[0]
                };
            }
            return null;
        }

        function getHeroPrimaryRoleCode(hero) {
            var primaryRole = getHeroPrimaryRole(hero);
            return primaryRole && primaryRole.code ? normalizeRoleCode(primaryRole.code) : '';
        }

        function getHeroSubRoles(hero) {
            var primaryCode = getHeroPrimaryRoleCode(hero);
            if (Array.isArray(hero && hero.subRoles)) {
                return hero.subRoles.map(function (role) {
                    var code = normalizeRoleCode(role.code || role.name);
                    return {
                        id: role.id,
                        code: code || role.code || '',
                        name: role.name || getRoleLabel(code) || code
                    };
                }).filter(function (role) {
                    return (role.code || role.name) && role.code !== primaryCode;
                });
            }
            return getHeroRoleCodes(hero).filter(function (code) {
                return code !== primaryCode;
            }).map(function (code) {
                return { code: code, name: getRoleLabel(code) || code };
            });
        }

        function getHeroLaneRoleLabels(hero) {
            var labels = [];
            var primaryRole = getHeroPrimaryRole(hero);
            if (primaryRole) {
                labels.push(primaryRole.name || getRoleLabel(primaryRole.code) || primaryRole.code);
            }
            getHeroSubRoles(hero).forEach(function (role) {
                labels.push(role.name || getRoleLabel(role.code) || role.code);
            });
            if (!labels.length && Array.isArray(hero && hero.laneRoles)) {
                return hero.laneRoles;
            }
            return labels;
        }

        function getHeroRoleCodes(hero) {
            var codes = [];
            function addCode(value) {
                var code = normalizeRoleCode(value);
                if (code && codes.indexOf(code) === -1) codes.push(code);
            }

            if (hero && hero.primaryRole) {
                addCode(hero.primaryRole.code || hero.primaryRole.name);
            }
            if (Array.isArray(hero && hero.subRoles)) {
                hero.subRoles.forEach(function (role) {
                    addCode(role.code || role.name);
                });
            }
            if (Array.isArray(hero && hero.roles)) {
                hero.roles.forEach(addCode);
            }
            if (Array.isArray(hero && hero.laneRoles)) {
                hero.laneRoles.forEach(addCode);
            }
            return codes;
        }

        function normalizeRoleCode(value) {
            var raw = String(value || '').trim().toUpperCase();
            if (ROLE_FILTERS.some(function (role) { return role.code === raw; })) {
                return raw;
            }

            var text = normalize(value);
            if (!text) return '';
            if (text.includes('dsl') || text.includes('ta than') || text.includes('solo') || text.includes('top')) return 'DSL';
            if (text.includes('jgl') || text.includes('rung') || text.includes('jungle')) return 'JGL';
            if (text.includes('mid') || text.includes('giua')) return 'MID';
            if (text.includes('adl') || text.includes('rong') || text.includes('xa thu') || text.includes('marksman')) return 'ADL';
            if (text.includes('sup') || text.includes('tro thu') || text.includes('ho tro') || text.includes('support')) return 'SUP';
            return '';
        }

        function getRoleLabel(value) {
            var code = normalizeRoleCode(value);
            var role = ROLE_FILTERS.find(function (item) { return item.code === code; });
            return role ? role.label : '';
        }

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        function normalize(value) {
            return (value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
        }

        function getBranchInitial(value) {
            var words = String(value || '').trim().split(/\s+/).filter(Boolean);
            if (!words.length) return '?';
            return words.slice(0, 2).map(function (word) {
                return word.charAt(0).toUpperCase();
            }).join('');
        }

        // ==================== INIT ====================

        function init() {
            activeTab = getTabFromUrl();
            initTabs();
            setActiveTab(activeTab);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
