<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Tier List - AoV Tactics & Guides</title>
    <link rel="stylesheet" href="/css/style.css?v=20260507-community-pages">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="tier-detail-page">
        <a class="tier-detail-back" href="/html/tier-list.html">← Tier List Cộng Đồng</a>

        <section class="tier-detail-state" id="tier-detail-state">Đang tải Tier List...</section>

        <section class="tier-detail-shell" id="tier-detail-shell" hidden>
            <div class="tier-detail-header">
                <div class="tier-detail-title-block">
                    <span class="tier-detail-kicker">Tier List Cộng Đồng</span>
                    <h1 id="tier-detail-title"></h1>
                    <div class="tier-detail-meta">
                        <img id="tier-detail-author-avatar" src="" alt="" referrerpolicy="no-referrer">
                        <span id="tier-detail-author"></span>
                        <span id="tier-detail-created"></span>
                        <span id="tier-detail-updated"></span>
                    </div>
                    <p class="tier-detail-note" id="tier-detail-note" hidden></p>
                </div>

                <aside class="tier-detail-rating-panel">
                    <div class="rating-summary">
                        <span>Đánh giá cộng đồng</span>
                        <strong id="tier-detail-average">0/5</strong>
                        <small id="tier-detail-rating-count">0 đánh giá</small>
                    </div>
                    <div class="detail-star-row" id="tier-detail-stars" aria-label="Đánh giá tier list"></div>
                    <p class="rating-login-message" id="tier-detail-rating-message"></p>
                </aside>
            </div>

            <section class="tier-detail-board-section">
                <h2>Bảng xếp hạng</h2>
                <div class="tier-detail-board-scroll">
                    <div class="tier-detail-board tier-board" id="tier-detail-board"></div>
                </div>
                <div class="tier-detail-actions">
                    <button type="button" class="tier-export-btn" id="tier-detail-export-btn" onclick="exportCurrentTierDetail(this)">Tải ảnh</button>
                    <button type="button" class="tier-export-btn tier-danger-btn" id="tier-detail-delete-btn" hidden>Xóa Tier List</button>
                </div>
            </section>

            <section class="tier-detail-comments">
                <div class="tier-detail-comments-head">
                    <h2>Bình luận</h2>
                    <span id="tier-detail-comment-count">0</span>
                </div>
                <div class="comment-composer" id="tier-detail-comment-composer"></div>
                <div class="comment-list" id="tier-detail-comments-list"></div>
            </section>
        </section>
    </main>

    <div id="tierListExportArea" class="tier-export-area" aria-hidden="true"></div>

    <footer>© 2026 AoV Tactics & Guides. All rights reserved.</footer>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="/js/tier-list-data.js?v=20260504-role-order"></script>
    <script src="/js/tier-list-export.js?v=20260506-tier-meta-export"></script>
    <script src="/js/auth.js?v=20260424-account-profile"></script>
    <script src="/js/header-loader.js?v=20260507-tierlist-nav-active"></script>
    <script src="/js/tier-list-detail.js?v=20260507-admin-rating-panel"></script>
</body>
</html>
