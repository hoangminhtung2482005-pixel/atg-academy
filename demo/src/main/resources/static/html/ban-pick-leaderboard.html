<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ban/Pick Leaderboard - ATG Academy</title>
    <link rel="stylesheet" href="/css/style.css?v=20260507-css-modules">
    <link rel="stylesheet" href="/css/ban-pick.css?v=20260517-solo-lobby-tabs">
<script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body data-ban-pick-view="leaderboard" data-disable-shared-footer="true">
<div id="header-placeholder"></div>
<main class="leader-shell">
    <section class="leader-hero">
        <div>
            <span>Solo Ban/Pick</span>
            <h1>Bảng xếp hạng</h1>
        </div>
        <a href="/html/ban-pick-solo.html">Vào Solo Ban/Pick</a>
    </section>
    <section class="leader-card" id="leaderboard-root">
        <div class="leader-row">Đang tải bảng xếp hạng...</div>
    </section>
</main>

<div id="footer-placeholder"></div>

<script src="/js/auth.js?v=30260429-banpick-product"></script>
<script src="/js/header-loader.js?v=20260515-banpick-footer-exception"></script>
<script>
    function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, char => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
        }[char]));
    }

    function heroText(stats) {
        const heroes = stats.mostPickedHeroes || [];
        return heroes.length ? heroes.map(hero => `${hero.heroName} (${hero.count})`).join(', ') : 'Chưa có pick';
    }

    function renderLeaderboard(players) {
        const root = document.getElementById('leaderboard-root');
        if (!players.length) {
            root.innerHTML = '<div class="leader-row">Chưa có dữ liệu xếp hạng.</div>';
            return;
        }
        root.innerHTML = `
            <div class="leader-row header">
                <span>Tier</span><span>Người chơi</span><span>Rating</span><span>Win rate</span><span>Most picked</span>
            </div>
            ${players.map((player, index) => `
                <div class="leader-row">
                    <span class="rank" title="${escapeHtml(player.rankLabel || 'Unranked')}">${escapeHtml(player.rankCode === 'UNRANKED' ? '—' : (player.rankCode || '—'))}</span>
                    <span class="player"><strong>${escapeHtml(player.user?.name || 'User')}</strong><span>#${index + 1} · ${player.totalMatches || 0} trận · W/L ${player.wins || 0}/${player.losses || 0}</span></span>
                    <span class="metric">${player.rating || 1000}</span>
                    <span class="metric">${player.winRate || 0}%</span>
                    <span class="heroes">${escapeHtml(heroText(player))}</span>
                </div>
            `).join('')}
        `;
    }

    async function loadLeaderboard() {
        const response = await fetch('/api/ban-pick/leaderboard');
        const payload = await response.json().catch(() => []);
        if (!response.ok) {
            document.getElementById('leaderboard-root').innerHTML = '<div class="leader-row">Không thể tải bảng xếp hạng.</div>';
            return;
        }
        renderLeaderboard(payload || []);
    }

    loadLeaderboard();
</script>
</body>
</html>
