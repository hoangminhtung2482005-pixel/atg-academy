<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiến thuật & Giáo án - ATG Academy</title>
    <link rel="stylesheet" href="/css/style.css?v=20260507-css-modules">
    <link rel="stylesheet" href="/css/guides.css?v=20260507-css-modules">
<script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="guides-page">
        <section class="guides-hero">
            <div>
                <h1>Chiến thuật & Giáo án</h1>
                <p>Khám phá các bài viết, giáo án và chiến thuật được chia sẻ bởi cộng đồng ATG.</p>
            </div>
            <span class="guide-count-pill" id="guide-count-pill">Đang tải</span>
        </section>

        <section class="guide-search-panel" aria-label="Tìm kiếm giáo án">
            <label class="guide-search-label" for="guide-search">Tìm giáo án</label>
            <div class="guide-search-shell">
                <span class="guide-search-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </span>
                <input id="guide-search" class="guide-search-input" type="search" placeholder="Tìm giáo án theo tên tướng...">
            </div>
            <div class="guide-filter-grid" aria-label="Bộ lọc giáo án">
                <label>
                    <span>Tướng</span>
                    <select id="guide-hero-filter" class="guide-filter-control">
                        <option value="">Tất cả tướng</option>
                    </select>
                </label>
                <label>
                    <span>Vị trí</span>
                    <select id="guide-lane-filter" class="guide-filter-control">
                        <option value="">Tất cả vị trí</option>
                        <option value="DSL">DSL</option>
                        <option value="JGL">JGL</option>
                        <option value="MID">MID</option>
                        <option value="ADL">ADL</option>
                        <option value="SUP">SUP</option>
                        <option value="Đường Tà Thần (DSL)">Đường Tà Thần</option>
                        <option value="Đi Rừng (JGL)">Đi Rừng</option>
                        <option value="Đường Giữa (MID)">Đường Giữa</option>
                        <option value="Xạ Thủ (ADL)">Xạ Thủ</option>
                        <option value="Trợ Thủ (SUP)">Trợ Thủ</option>
                    </select>
                </label>
                <label>
                    <span>Thể loại</span>
                    <select id="guide-category-filter" class="guide-filter-control">
                        <option value="">Tất cả thể loại</option>
                        <option value="Chiến thuật">Chiến thuật</option>
                        <option value="Chiến thuật vĩ mô">Chiến thuật vĩ mô</option>
                        <option value="Phân tích">Phân tích</option>
                        <option value="Cấm/chọn">Cấm/chọn</option>
                        <option value="Tướng">Tướng</option>
                        <option value="Đội hình">Đội hình</option>
                    </select>
                </label>
                <label>
                    <span>Sắp xếp</span>
                    <select id="guide-sort-filter" class="guide-filter-control">
                        <option value="newest">Mới nhất</option>
                        <option value="views">Xem nhiều nhất</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="guides-grid" id="guides-grid" aria-live="polite">
            <div class="guide-state">Đang tải giáo án đã xuất bản...</div>
        </section>

        <div class="guide-list-actions">
            <button type="button" class="create-guide-action" onclick="handleCreateGuideClick()">+ Tạo giáo án</button>
        </div>
    </main>

    <div class="guide-toast" id="guide-toast" role="status" aria-live="polite"></div>

    <footer>
        © 2026 ATG Academy. Nền tảng esports chuyên sâu.
    </footer>

    <script src="/js/tier-list-data.js?v=20260426-guide-search"></script>
    <script src="/js/auth.js?v=20260424-account-profile"></script>
    <script src="/js/header-loader.js?v=20260514-layout-partials"></script>
    <script src="/js/tactics-guides.js?v=20260426-guide-search"></script>
</body>
</html>
