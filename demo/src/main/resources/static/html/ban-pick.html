<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang chuyển Ban/Pick - AoV Tactics & Guides</title>
    <meta http-equiv="refresh" content="0; url=/html/ban-pick-free.html">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const roomCode = params.get('room');
            const rawMode = String(params.get('mode') || '').trim().toLowerCase();
            const modeTargets = {
                free: '/html/ban-pick-free.html',
                standard: '/html/ban-pick-standard.html',
                solo: '/html/ban-pick-solo.html',
                'solo-1v1': '/html/ban-pick-solo.html'
            };

            let nextUrl = '/html/ban-pick-free.html';
            if (roomCode) {
                nextUrl = `/html/ban-pick-solo.html?room=${encodeURIComponent(roomCode)}`;
            } else if (modeTargets[rawMode]) {
                nextUrl = modeTargets[rawMode];
            }

            window.location.replace(nextUrl);
        })();
    </script>
</head>

<body>
    <main>
        <p>Đang chuyển tới chế độ Ban/Pick mặc định.</p>
        <p><a href="/html/ban-pick-free.html">Mở Free Mode</a></p>
    </main>
</body>

</html>
