spring.application.name=demo
server.forward-headers-strategy=framework

# ============================
# Cấu hình MySQL Database
# ============================
# Đã bổ sung allowPublicKeyRetrieval=true ở cuối cùng
spring.datasource.url=jdbc:mysql://localhost:3306/aov_tactics?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# Cấu hình JPA & Hibernate
# ============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always

# ============================
# Bao mat Google JWT
# ============================
app.security.google-client-id=422848404584-2r1fgoo4uh06p10fbskvtrapvr0pgh28.apps.googleusercontent.com
app.security.admin-emails=hoangminhtung.2482005@gmail.com
app.security.staff-emails=
app.admin.esports-reset.allow-production=false
banpick.season-reset.scheduler-enabled=false
banpick.season-reset.scheduler-cron=0 0 0 * * *

# ============================
# CORS — Danh sách domain được phép gọi API
# (Ngrok, localhost dev, v.v.)
